<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relatórios Grupo 2</title>
    
    <!-- PWA Settings and Mobile Optimization -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/pwa-icon.png" />
    <link rel="apple-touch-icon" href="/pwa-icon.png" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Relatórios G2" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body class="bg-slate-50 antialiased selection:bg-slate-900 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register service worker for offline loading & setup install trigger -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker de Relatórios registrado com sucesso!', reg.scope))
            .catch(err => console.error('Falha no registro do Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
